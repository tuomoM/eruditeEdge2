<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>eruditeEdge2</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/ed2.css') }}">
</head>
<body>
    <nav class="site-nav">
        <a class="brand" href="/">eD2</a>
        {% if session.user_id %}
            <div class="nav-links">
                <a href="/vocabulary">Vocabulary</a>
                <a href="/vocabulary/new">Add word</a>
                <a href="/training/select">Training</a>
            </div>
            <form class="logout-form" action="/logout" method="post">
                <button class="button-secondary" type="submit">Log out</button>
            </form>
        {% else %}
            <div class="nav-links">
                <a href="/login">Log in</a>
                <a href="/register">Register</a>
            </div>
        {% endif %}
    </nav>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div>{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</body>
</html>
