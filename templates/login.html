{% extends "base.html" %}

{% block content %}
<h1>Log in</h1>

<form id="password-login-form" action="/login" method="post">
    <div class="field field-wide">
        <label for="username">User id</label><br>
        <input id="username" name="username" value="{{ username or '' }}" required>
    </div>
    <div class="field field-wide">
        <label for="password">Password</label><br>
        <input id="password" name="password" type="password" required>
    </div>
</form>

<div class="actions">
    <button class="button-primary" type="submit" form="password-login-form">Log in</button>
    {% if google_login_enabled %}
        <form action="/login/google" method="post" class="inline-form google-login-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button class="google-auth-button" type="submit">
                <span class="google-mark" aria-hidden="true">G</span>
                Log in with Google
            </button>
        </form>
    {% endif %}
    <a class="button button-secondary" href="/register">Register</a>
</div>
{% endblock %}
