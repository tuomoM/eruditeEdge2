{% extends "base.html" %}

{% block content %}
<h1>Log in</h1>
{% if google_login_enabled %}
    <form action="/login/google" method="post" class="google-login-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="actions">
            <button type="submit">Log in with Google</button>
        </div>
    </form>
{% endif %}

<form action="/login" method="post">
    <div class="field field-wide">
        <label for="username">User id</label><br>
        <input id="username" name="username" value="{{ username or '' }}" required>
    </div>
    <div class="field field-wide">
        <label for="password">Password</label><br>
        <input id="password" name="password" type="password" required>
    </div>
    <div class="actions">
        <button type="submit">Log in</button>
        <a class="button button-secondary" href="/register">Register</a>
    </div>
</form>
{% endblock %}
