{% extends "base.html" %}

{% block content %}
<h1>Register</h1>
<form action="/register" method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="field field-wide">
        <label for="username">User id</label><br>
        <input id="username" name="username" value="{{ username or '' }}" required>
    </div>
    <div class="field field-wide">
        <label for="password">Password</label><br>
        <input id="password" name="password" type="password" required>
    </div>
    <div class="field field-wide">
        <label for="invite_code">Invite code</label><br>
        <input id="invite_code" name="invite_code" value="{{ invite_code or '' }}" required>
    </div>
    <div class="actions">
        <button type="submit">Create account</button>
        <a class="button button-secondary" href="/login">Log in</a>
    </div>
</form>
{% endblock %}
